<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open 4X</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: #0f1117;
        color: #d8d8d8;
        font-family: 'Segoe UI', system-ui, sans-serif;
        height: 100vh;
        overflow: hidden;
      }

      /* ---- page-level layout ---- */
      .page-center {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        gap: 1.5rem;
      }

      .card {
        background: #1a1d27;
        border: 1px solid #2e3248;
        border-radius: 10px;
        padding: 2.5rem 3.5rem;
        min-width: 320px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.2rem;
      }

      .title {
        font-size: 2.6rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        color: #e8c87a;
      }

      .subtitle {
        font-size: 0.9rem;
        color: #7a7f99;
      }

      /* ---- buttons ---- */
      .btn {
        padding: 0.55rem 1.6rem;
        border-radius: 6px;
        border: none;
        cursor: pointer;
        font-size: 0.95rem;
        font-weight: 600;
        transition: filter 0.15s;
      }
      .btn:hover { filter: brightness(1.2); }
      .btn-primary  { background: #4e7df4; color: #fff; }
      .btn-ghost    { background: transparent; color: #9aa; border: 1px solid #2e3248; }
      .btn-back     { background: transparent; color: #7a7f99; border: none; font-size: 0.85rem; cursor: pointer; }
      .btn-back:hover { color: #d8d8d8; }

      /* ---- settings / players page ---- */
      .page-header {
        width: 100%;
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 1rem 1.5rem;
        border-bottom: 1px solid #1e2130;
        background: #13151e;
      }

      .page-header h2 {
        font-size: 1.1rem;
        font-weight: 600;
        color: #ccc;
      }

      .panel-body {
        padding: 2rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .player-row {
        display: flex;
        align-items: center;
        gap: 1rem;
        background: #1a1d27;
        border: 1px solid #2e3248;
        border-radius: 8px;
        padding: 0.8rem 1.2rem;
      }

      .player-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: #4e7df4;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 1rem;
        color: #fff;
        flex-shrink: 0;
      }

      .player-info { flex: 1; }
      .player-name { font-weight: 600; font-size: 0.95rem; }
      .player-civ  { font-size: 0.8rem; color: #7a7f99; }

      .empty-note {
        color: #555;
        font-size: 0.9rem;
        padding: 1rem;
      }

      /* ---- game UI ---- */
      .game-layout {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      .game-topbar {
        display: flex;
        align-items: center;
        gap: 1.5rem;
        padding: 0.5rem 1rem;
        background: #13151e;
        border-bottom: 1px solid #1e2130;
        flex-shrink: 0;
      }

      .game-topbar .turn-label {
        font-size: 0.85rem;
        color: #9aa;
      }

      .game-topbar .civ-name {
        font-weight: 700;
        font-size: 1rem;
        color: #e8c87a;
      }

      .game-main {
        display: flex;
        flex: 1;
        overflow: hidden;
        position: relative;
      }

      .hex-viewport {
        flex: 1;
        overflow: auto;
        background: #09090f;
      }

      .hex-viewport svg {
        display: block;
      }

      /* ---- sidebar (Map tab) ---- */
      .sidebar {
        width: 220px;
        background: #13151e;
        border-left: 1px solid #1e2130;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.8rem;
        overflow-y: auto;
        flex-shrink: 0;
      }

      .sidebar h3 {
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: #555;
        border-bottom: 1px solid #1e2130;
        padding-bottom: 0.4rem;
      }

      .sidebar .info-row {
        display: flex;
        justify-content: space-between;
        font-size: 0.85rem;
        color: #bbb;
      }

      .sidebar .info-label { color: #666; }

      .no-selection {
        color: #444;
        font-size: 0.85rem;
        padding-top: 0.5rem;
      }

      /* ---- tab bar ---- */
      .tab-bar {
        display: flex;
        gap: 0;
        background: #13151e;
        border-bottom: 2px solid #1e2130;
        flex-shrink: 0;
        overflow-x: auto;
      }

      .tab-btn {
        padding: 0.5rem 1.2rem;
        background: transparent;
        border: none;
        border-bottom: 2px solid transparent;
        color: #7a7f99;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        white-space: nowrap;
        transition: color 0.15s, border-color 0.15s;
      }

      .tab-btn:hover {
        color: #d8d8d8;
      }

      .tab-btn.tab-active {
        color: #e8c87a;
        border-bottom-color: #e8c87a;
      }

      /* ---- sub-tab bar (data reports) ---- */
      .sub-tab-bar {
        display: flex;
        gap: 0;
        background: #1a1d27;
        border-bottom: 1px solid #2e3248;
        padding: 0 0.5rem;
      }

      .sub-tab-btn {
        font-size: 0.8rem;
        padding: 0.4rem 1rem;
      }

      /* ---- tab content ---- */
      .tab-content {
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        width: 100%;
        background: rgba(15, 17, 23, 0.95);
        overflow-y: auto;
        z-index: 10;
        display: flex;
        flex-direction: column;
      }

      .tab-body {
        flex: 1;
        overflow-y: auto;
        padding: 1rem;
      }

      /* ---- data tables ---- */
      .data-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.85rem;
      }

      .data-table th {
        text-align: left;
        padding: 0.5rem 0.8rem;
        background: #1a1d27;
        color: #7a7f99;
        font-weight: 600;
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        border-bottom: 1px solid #2e3248;
        position: sticky;
        top: 0;
      }

      .data-table td {
        padding: 0.4rem 0.8rem;
        border-bottom: 1px solid #1e2130;
        color: #bbb;
      }

      .data-table tr:hover td {
        background: #1a1d27;
      }

      .data-section-header td {
        font-weight: 700;
        color: #e8c87a;
        padding-top: 1rem;
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      /* ---- tech / civic tree ---- */
      .tech-header {
        padding: 1rem;
        background: #1a1d27;
        border-bottom: 1px solid #2e3248;
      }

      .tech-summary {
        font-size: 0.9rem;
        color: #9aa;
      }

      .tech-current {
        margin-top: 0.5rem;
        font-size: 0.9rem;
        color: #d8d8d8;
      }

      .progress-bar {
        height: 6px;
        background: #2e3248;
        border-radius: 3px;
        margin-top: 0.4rem;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        background: #4e7df4;
        border-radius: 3px;
        transition: width 0.3s;
      }

      .tech-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 0.6rem;
        padding: 1rem;
      }

      .tech-node {
        border-radius: 8px;
        padding: 0.7rem 0.9rem;
        cursor: pointer;
        transition: filter 0.15s, transform 0.1s;
      }

      .tech-node:hover { filter: brightness(1.15); transform: translateY(-1px); }

      .tech-researched {
        background: #1a3a2a;
        border: 1px solid #2a5a3a;
      }

      .tech-in-progress {
        background: #2a2a1a;
        border: 1px solid #5a5a2a;
      }

      .tech-available {
        background: #1a2a3a;
        border: 1px solid #2a4a6a;
      }

      .tech-locked {
        background: #1a1d27;
        border: 1px solid #2e3248;
        opacity: 0.5;
        cursor: default;
      }

      .tech-name {
        font-size: 0.85rem;
        font-weight: 600;
        color: #d8d8d8;
      }

      .tech-cost {
        font-size: 0.75rem;
        color: #7a7f99;
        margin-top: 0.2rem;
      }

      .tech-eureka {
        font-size: 0.7rem;
        color: #9ab;
        margin-top: 0.3rem;
        font-style: italic;
      }

      /* ---- diplomacy status colors ---- */
      .diplo-war       { color: #e05050; }
      .diplo-denounced  { color: #e0a050; }
      .diplo-neutral    { color: #9aa; }
      .diplo-friendly   { color: #50c070; }
      .diplo-alliance   { color: #50a0e0; }

      /* ---- city management tab ---- */
      .city-header {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 1rem;
        background: #1a1d27;
        border-bottom: 1px solid #2e3248;
      }

      .city-header h2 {
        font-size: 1.2rem;
        font-weight: 700;
        color: #e8c87a;
      }

      .city-stats {
        display: flex;
        gap: 0.8rem;
        padding: 1rem;
        flex-wrap: wrap;
      }

      .stat-card {
        background: #1a1d27;
        border: 1px solid #2e3248;
        border-radius: 8px;
        padding: 0.8rem 1.2rem;
        min-width: 120px;
        text-align: center;
      }

      .stat-label {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #7a7f99;
      }

      .stat-value {
        font-size: 1.1rem;
        font-weight: 700;
        color: #d8d8d8;
        margin-top: 0.3rem;
      }

      .city-sections {
        display: flex;
        gap: 1rem;
        padding: 0 1rem;
        flex-wrap: wrap;
      }

      .city-section {
        padding: 1rem;
      }

      .city-section h3 {
        font-size: 0.85rem;
        font-weight: 600;
        color: #9aa;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 0.5rem;
      }

      .city-section h4 {
        font-size: 0.8rem;
        color: #7a7f99;
        margin: 0.8rem 0 0.3rem;
      }

      .item-list {
        list-style: none;
        padding: 0;
      }

      .item-list li {
        padding: 0.3rem 0;
        font-size: 0.85rem;
        color: #bbb;
        border-bottom: 1px solid #1e2130;
      }

      .production-options {
        display: flex;
        flex-wrap: wrap;
        gap: 0.3rem;
      }

      .production-btn {
        font-size: 0.8rem;
        padding: 0.3rem 0.6rem;
      }

      /* ---- placeholder tabs ---- */
      .placeholder-tab {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.8rem;
        padding: 3rem;
      }

      .placeholder-tab h2 {
        color: #e8c87a;
        font-size: 1.4rem;
      }

      .placeholder-msg {
        color: #7a7f99;
        font-size: 1rem;
      }

      .placeholder-hint {
        color: #555;
        font-size: 0.85rem;
        max-width: 400px;
        text-align: center;
        line-height: 1.5;
      }

      /* ---- hex SVG elements ---- */
      .hex-cell {
        cursor: pointer;
        stroke-width: 1;
      }
      .hex-cell:hover { filter: brightness(1.25); }

      .unit-dot { pointer-events: none; }
      .city-marker { pointer-events: none; }

      /* ---- map config page ---- */
      .config-card {
        background: #1a1d27;
        border: 1px solid #2e3248;
        border-radius: 10px;
        padding: 1.8rem 2rem;
        max-width: 480px;
        width: 100%;
      }

      .config-label {
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #7a7f99;
        margin-bottom: 0.5rem;
      }

      .preset-row {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      .preset-btn {
        flex: 1;
        min-width: 100px;
        font-size: 0.85rem;
        padding: 0.45rem 0.8rem;
      }

      .preset-active {
        background: #4e7df4 !important;
        color: #fff !important;
        border-color: #4e7df4 !important;
      }

      .config-input {
        width: 100%;
        background: #0f1117;
        border: 1px solid #2e3248;
        border-radius: 6px;
        color: #d8d8d8;
        font-size: 0.95rem;
        padding: 0.45rem 0.7rem;
      }

      .config-input:focus {
        outline: none;
        border-color: #4e7df4;
      }

      /* ---- replay page ---- */
      .replay-topbar {
        display: flex;
        align-items: center;
        gap: 1.5rem;
        padding: 0.5rem 1rem;
        background: #13151e;
        border-bottom: 1px solid #1e2130;
        flex-shrink: 0;
      }

      .replay-controls {
        background: #13151e;
        border-top: 1px solid #1e2130;
        padding: 0.5rem 1rem;
        flex-shrink: 0;
      }

      .replay-controls-inner {
        display: flex;
        align-items: center;
        gap: 0.4rem;
      }

      .replay-btn {
        font-size: 1.1rem;
        padding: 0.3rem 0.7rem;
        min-width: 2.2rem;
        text-align: center;
      }

      .replay-civ-btn {
        font-size: 0.8rem;
        padding: 0.25rem 0.7rem;
      }

      .replay-turn-label {
        font-size: 0.85rem;
        color: #9aa;
        margin-left: 0.8rem;
      }

      .replay-info-panel {
        background: #13151e;
        border-top: 1px solid #1e2130;
        padding: 0.5rem 1rem;
        font-size: 0.85rem;
        color: #bbb;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <!-- trunk replaces this with the WASM bundle -->
  </body>
</html>
