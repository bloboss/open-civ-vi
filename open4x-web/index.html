<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open 4X</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: #0f1117;
        color: #d8d8d8;
        font-family: 'Segoe UI', system-ui, sans-serif;
        height: 100vh;
        overflow: hidden;
      }

      /* ---- page-level layout ---- */
      .page-center {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        gap: 1.5rem;
      }

      .card {
        background: #1a1d27;
        border: 1px solid #2e3248;
        border-radius: 10px;
        padding: 2.5rem 3.5rem;
        min-width: 320px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.2rem;
      }

      .title {
        font-size: 2.6rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        color: #e8c87a;
      }

      .subtitle {
        font-size: 0.9rem;
        color: #7a7f99;
      }

      /* ---- buttons ---- */
      .btn {
        padding: 0.55rem 1.6rem;
        border-radius: 6px;
        border: none;
        cursor: pointer;
        font-size: 0.95rem;
        font-weight: 600;
        transition: filter 0.15s;
      }
      .btn:hover { filter: brightness(1.2); }
      .btn-primary  { background: #4e7df4; color: #fff; }
      .btn-ghost    { background: transparent; color: #9aa; border: 1px solid #2e3248; }
      .btn-back     { background: transparent; color: #7a7f99; border: none; font-size: 0.85rem; cursor: pointer; }
      .btn-back:hover { color: #d8d8d8; }

      /* ---- settings / players page ---- */
      .page-header {
        width: 100%;
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 1rem 1.5rem;
        border-bottom: 1px solid #1e2130;
        background: #13151e;
      }

      .page-header h2 {
        font-size: 1.1rem;
        font-weight: 600;
        color: #ccc;
      }

      .panel-body {
        padding: 2rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .player-row {
        display: flex;
        align-items: center;
        gap: 1rem;
        background: #1a1d27;
        border: 1px solid #2e3248;
        border-radius: 8px;
        padding: 0.8rem 1.2rem;
      }

      .player-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: #4e7df4;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 1rem;
        color: #fff;
        flex-shrink: 0;
      }

      .player-info { flex: 1; }
      .player-name { font-weight: 600; font-size: 0.95rem; }
      .player-civ  { font-size: 0.8rem; color: #7a7f99; }

      .empty-note {
        color: #555;
        font-size: 0.9rem;
        padding: 1rem;
      }

      /* ---- game UI ---- */
      .game-layout {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      .game-topbar {
        display: flex;
        align-items: center;
        gap: 1.5rem;
        padding: 0.5rem 1rem;
        background: #13151e;
        border-bottom: 1px solid #1e2130;
        flex-shrink: 0;
      }

      .game-topbar .turn-label {
        font-size: 0.85rem;
        color: #9aa;
      }

      .game-topbar .civ-name {
        font-weight: 700;
        font-size: 1rem;
        color: #e8c87a;
      }

      .game-main {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      .hex-viewport {
        flex: 1;
        overflow: auto;
        background: #09090f;
      }

      .hex-viewport svg {
        display: block;
      }

      /* ---- sidebar ---- */
      .sidebar {
        width: 220px;
        background: #13151e;
        border-left: 1px solid #1e2130;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.8rem;
        overflow-y: auto;
        flex-shrink: 0;
      }

      .sidebar h3 {
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: #555;
        border-bottom: 1px solid #1e2130;
        padding-bottom: 0.4rem;
      }

      .sidebar .info-row {
        display: flex;
        justify-content: space-between;
        font-size: 0.85rem;
        color: #bbb;
      }

      .sidebar .info-label { color: #666; }

      .no-selection {
        color: #444;
        font-size: 0.85rem;
        padding-top: 0.5rem;
      }

      /* ---- hex SVG elements ---- */
      .hex-cell {
        cursor: pointer;
        stroke-width: 1;
      }
      .hex-cell:hover { filter: brightness(1.25); }

      .unit-dot { pointer-events: none; }
      .city-marker { pointer-events: none; }

      /* ---- map config page ---- */
      .config-card {
        background: #1a1d27;
        border: 1px solid #2e3248;
        border-radius: 10px;
        padding: 1.8rem 2rem;
        max-width: 480px;
        width: 100%;
      }

      .config-label {
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #7a7f99;
        margin-bottom: 0.5rem;
      }

      .preset-row {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      .preset-btn {
        flex: 1;
        min-width: 100px;
        font-size: 0.85rem;
        padding: 0.45rem 0.8rem;
      }

      .preset-active {
        background: #4e7df4 !important;
        color: #fff !important;
        border-color: #4e7df4 !important;
      }

      .config-input {
        width: 100%;
        background: #0f1117;
        border: 1px solid #2e3248;
        border-radius: 6px;
        color: #d8d8d8;
        font-size: 0.95rem;
        padding: 0.45rem 0.7rem;
      }

      .config-input:focus {
        outline: none;
        border-color: #4e7df4;
      }

      /* ---- replay page ---- */
      .replay-topbar {
        display: flex;
        align-items: center;
        gap: 1.5rem;
        padding: 0.5rem 1rem;
        background: #13151e;
        border-bottom: 1px solid #1e2130;
        flex-shrink: 0;
      }

      .replay-controls {
        background: #13151e;
        border-top: 1px solid #1e2130;
        padding: 0.5rem 1rem;
        flex-shrink: 0;
      }

      .replay-controls-inner {
        display: flex;
        align-items: center;
        gap: 0.4rem;
      }

      .replay-btn {
        font-size: 1.1rem;
        padding: 0.3rem 0.7rem;
        min-width: 2.2rem;
        text-align: center;
      }

      .replay-civ-btn {
        font-size: 0.8rem;
        padding: 0.25rem 0.7rem;
      }

      .replay-turn-label {
        font-size: 0.85rem;
        color: #9aa;
        margin-left: 0.8rem;
      }

      .replay-info-panel {
        background: #13151e;
        border-top: 1px solid #1e2130;
        padding: 0.5rem 1rem;
        font-size: 0.85rem;
        color: #bbb;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <!-- trunk replaces this with the WASM bundle -->
  </body>
</html>
