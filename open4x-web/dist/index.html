<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open 4X</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: #0f1117;
        color: #d8d8d8;
        font-family: 'Segoe UI', system-ui, sans-serif;
        height: 100vh;
        overflow: hidden;
      }

      /* ---- page-level layout ---- */
      .page-center {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        gap: 1.5rem;
      }

      .card {
        background: #1a1d27;
        border: 1px solid #2e3248;
        border-radius: 10px;
        padding: 2.5rem 3.5rem;
        min-width: 320px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.2rem;
      }

      .title {
        font-size: 2.6rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        color: #e8c87a;
      }

      .subtitle {
        font-size: 0.9rem;
        color: #7a7f99;
      }

      /* ---- buttons ---- */
      .btn {
        padding: 0.55rem 1.6rem;
        border-radius: 6px;
        border: none;
        cursor: pointer;
        font-size: 0.95rem;
        font-weight: 600;
        transition: filter 0.15s;
      }
      .btn:hover { filter: brightness(1.2); }
      .btn-primary  { background: #4e7df4; color: #fff; }
      .btn-ghost    { background: transparent; color: #9aa; border: 1px solid #2e3248; }
      .btn-back     { background: transparent; color: #7a7f99; border: none; font-size: 0.85rem; cursor: pointer; }
      .btn-back:hover { color: #d8d8d8; }

      /* ---- settings / players page ---- */
      .page-header {
        width: 100%;
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 1rem 1.5rem;
        border-bottom: 1px solid #1e2130;
        background: #13151e;
      }

      .page-header h2 {
        font-size: 1.1rem;
        font-weight: 600;
        color: #ccc;
      }

      .panel-body {
        padding: 2rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .player-row {
        display: flex;
        align-items: center;
        gap: 1rem;
        background: #1a1d27;
        border: 1px solid #2e3248;
        border-radius: 8px;
        padding: 0.8rem 1.2rem;
      }

      .player-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: #4e7df4;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 1rem;
        color: #fff;
        flex-shrink: 0;
      }

      .player-info { flex: 1; }
      .player-name { font-weight: 600; font-size: 0.95rem; }
      .player-civ  { font-size: 0.8rem; color: #7a7f99; }

      .empty-note {
        color: #555;
        font-size: 0.9rem;
        padding: 1rem;
      }

      /* ---- game UI ---- */
      .game-layout {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      .game-topbar {
        display: flex;
        align-items: center;
        gap: 1.5rem;
        padding: 0.5rem 1rem;
        background: #13151e;
        border-bottom: 1px solid #1e2130;
        flex-shrink: 0;
      }

      .game-topbar .turn-label {
        font-size: 0.85rem;
        color: #9aa;
      }

      .game-topbar .civ-name {
        font-weight: 700;
        font-size: 1rem;
        color: #e8c87a;
      }

      .game-main {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      .hex-viewport {
        flex: 1;
        overflow: auto;
        background: #09090f;
      }

      .hex-viewport svg {
        display: block;
      }

      /* ---- sidebar ---- */
      .sidebar {
        width: 220px;
        background: #13151e;
        border-left: 1px solid #1e2130;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.8rem;
        overflow-y: auto;
        flex-shrink: 0;
      }

      .sidebar h3 {
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: #555;
        border-bottom: 1px solid #1e2130;
        padding-bottom: 0.4rem;
      }

      .sidebar .info-row {
        display: flex;
        justify-content: space-between;
        font-size: 0.85rem;
        color: #bbb;
      }

      .sidebar .info-label { color: #666; }

      .no-selection {
        color: #444;
        font-size: 0.85rem;
        padding-top: 0.5rem;
      }

      /* ---- hex SVG elements ---- */
      .hex-cell {
        cursor: pointer;
        stroke-width: 1;
      }
      .hex-cell:hover { filter: brightness(1.25); }

      .unit-dot { pointer-events: none; }
      .city-marker { pointer-events: none; }
    </style>
  <link rel="modulepreload" href="/open4x-web-919a33c90b2662c4.js" crossorigin="anonymous" integrity="sha384-MPHAWlBfql42R/8FAvNZpEg31ix+gFlYWuW03fwb4TB4mmZlAJDbrKYgonpRyOTA"><link rel="preload" href="/open4x-web-919a33c90b2662c4_bg.wasm" crossorigin="anonymous" integrity="sha384-kX6tFYM7dJkWcG/z86MxrU28N1qXhXbFKubzgYo2/d23hmNHh0UyklAanEGnkwiX" as="fetch" type="application/wasm"></head>

<script type="module">
import init, * as bindings from '/open4x-web-919a33c90b2662c4.js';
const wasm = await init({ module_or_path: '/open4x-web-919a33c90b2662c4_bg.wasm' });

</script><script>"use strict";

(function () {

    const address = '{{__TRUNK_ADDRESS__}}';
    const base = '{{__TRUNK_WS_BASE__}}';
    let protocol = '';
    protocol =
        protocol
            ? protocol
            : window.location.protocol === 'https:'
                ? 'wss'
                : 'ws';
    const url = protocol + '://' + address + base + '.well-known/trunk/ws';

    class Overlay {
        constructor() {
            // create an overlay
            this._overlay = document.createElement("div");
            const style = this._overlay.style;
            style.height = "100vh";
            style.width = "100vw";
            style.position = "fixed";
            style.top = "0";
            style.left = "0";
            style.backgroundColor = "rgba(222, 222, 222, 0.5)";
            style.fontFamily = "sans-serif";
            // not sure that's the right approach
            style.zIndex = "1000000";
            style.backdropFilter = "blur(1rem)";

            const container = document.createElement("div");
            // center it
            container.style.position = "absolute";
            container.style.top = "30%";
            container.style.left = "15%";
            container.style.maxWidth = "85%";

            this._title = document.createElement("div");
            this._title.innerText = "Build failure";
            this._title.style.paddingBottom = "2rem";
            this._title.style.fontSize = "2.5rem";

            this._message = document.createElement("div");
            this._message.style.whiteSpace = "pre-wrap";

            const icon= document.createElement("div");
            icon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="#dc3545" viewBox="0 0 16 16"><path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5zm.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/></svg>';
            this._title.prepend(icon);

            container.append(this._title, this._message);
            this._overlay.append(container);

            this._inject();
            window.setInterval(() => {
                this._inject();
            }, 250);
        }

        set reason(reason) {
            this._message.textContent = reason;
        }

        _inject() {
            if (!this._overlay.isConnected) {
                // prepend it
                document.body?.prepend(this._overlay);
            }
        }

    }

    class Client {
        constructor(url) {
            this.url = url;
            this.poll_interval = 5000;
            this._overlay = null;
        }

        start() {
            const ws = new WebSocket(this.url);
            ws.onmessage = (ev) => {
                const msg = JSON.parse(ev.data);
                switch (msg.type) {
                    case "reload":
                        this.reload();
                        break;
                    case "buildFailure":
                        this.buildFailure(msg.data)
                        break;
                }
            };
            ws.onclose = () => this.onclose();
        }

        onclose() {
            window.setTimeout(
                () => {
                    // when we successfully reconnect, we'll force a
                    // reload (since we presumably lost connection to
                    // trunk due to it being killed, so it will have
                    // rebuilt on restart)
                    const ws = new WebSocket(this.url);
                    ws.onopen = () => window.location.reload();
                    ws.onclose = () => this.onclose();
                },
                this.poll_interval);
        }

        reload() {
            window.location.reload();
        }

        buildFailure({reason}) {
            // also log the console
            console.error("Build failed:", reason);

            console.debug("Overlay", this._overlay);

            if (!this._overlay) {
                this._overlay = new Overlay();
            }
            this._overlay.reason = reason;
        }
    }

    new Client(url).start();

})()
</script></body>
</html>
